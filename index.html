<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1018" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>回声里的家</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="startScreen" class="screen screen-start is-active">
        <div class="start-mark" aria-hidden="true"></div>
        <div class="start-copy">
          <p class="eyebrow">Spatial Audio Story</p>
          <h1>回声里的家</h1>
          <p>竖屏戴上耳机，用声音在家里摸索前进。</p>
        </div>
        <button id="startButton" class="primary-button" type="button">开始</button>
        <p id="startStatus" class="status-note">点击后启用音频和手机姿态。</p>
      </section>

      <section id="setupScreen" class="screen screen-setup">
        <div class="setup-card">
          <p class="eyebrow">Calibration</p>
          <h2 id="setupTitle">先校准手机</h2>
          <p id="setupText">竖屏自然握持手机，保持现在的姿势不动。</p>
          <p id="setupHint" class="status-note">校准后会进入 6 步新手教学。</p>
          <div class="setup-actions">
            <button id="calibrateButton" class="primary-button" type="button">校准</button>
            <button id="skipTutorialButton" class="secondary-button" type="button">跳过教学</button>
          </div>
          <div class="invert-actions">
            <button id="invertForwardButton" class="ghost-button" type="button">前后反了</button>
            <button id="invertRightButton" class="ghost-button" type="button">左右反了</button>
          </div>
        </div>
      </section>

      <section id="gameScreen" class="screen screen-game" aria-label="剧情游戏画面">
        <div class="sound-field" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <section id="minimapPanel" class="minimap-panel" aria-label="调试小地图">
          <canvas id="mapCanvas" aria-label="竖屏关卡小地图"></canvas>
        </section>

        <button id="debugHotspot" class="debug-hotspot" type="button" aria-label="切换调试信息"></button>
        <aside id="debugPanel" class="debug-panel" aria-live="polite">
          <span id="debugScene">场景 --</span>
          <span id="debugStep">步骤 --</span>
          <span id="debugDistance">距离 --</span>
          <span id="debugSensor">姿态 --</span>
          <span id="debugMic">麦克风 --</span>
          <span id="debugMap">地图 --</span>
        </aside>

        <div class="turn-layer" aria-hidden="true">
          <div class="turn-zone turn-left">‹</div>
          <div class="turn-zone turn-right">›</div>
        </div>

        <section id="storyPanel" class="story-panel">
          <p id="speakerText" class="speaker-text">内心</p>
          <p id="storyText" class="story-text">......</p>
          <p id="instructionText" class="instruction-text">轻触继续</p>
        </section>
      </section>

      <section id="endingScreen" class="screen screen-ending">
        <div class="ending-copy">
          <p class="eyebrow">Echo</p>
          <h2>你听见了</h2>
          <p>那些被放在磁带里的爱，从来没有离开。</p>
        </div>
        <button id="playAgainButton" class="primary-button" type="button">再玩一次</button>
      </section>

      <section id="developerScreen" class="screen screen-developer">
        <div class="developer-card">
          <p class="eyebrow">Developer</p>
          <h1>后台控制</h1>
          <p>输入开发者密码后，可以全局控制玩家端是否显示小地图。</p>

          <form id="developerLogin" class="developer-login">
            <label for="developerPassword">开发者密码</label>
            <input id="developerPassword" type="password" autocomplete="current-password" />
            <button class="primary-button" type="submit">进入</button>
          </form>

          <section id="developerControls" class="developer-controls" aria-live="polite">
            <label class="toggle-row">
              <span>
                <strong>玩家可见小地图</strong>
                <small>关闭后玩家端只保留沉浸暗场和字幕。</small>
              </span>
              <input id="minimapToggle" type="checkbox" />
            </label>
            <button id="refreshSettingsButton" class="secondary-button" type="button">刷新状态</button>
          </section>

          <p id="developerStatus" class="status-note">等待登录。</p>
        </div>
      </section>
    </main>

    <noscript>这个 demo 需要启用 JavaScript。</noscript>
    <script src="./game.js" defer></script>
  </body>
</html>
